steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cg-crm-backend', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cg-crm-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'run', 'deploy', 'cg-crm-backend', '--image', 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cg-crm-backend', '--region', 'asia-south1', '--platform', 'managed']